name: build-push
on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - docs/**
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
  build:
    needs: secret-scan
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/jemplayer82/bareos-truenas-dash:latest
            ghcr.io/jemplayer82/bareos-truenas-dash:${{ github.sha }}
